<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裂痕 · FRACTURE</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg-soft: #0f141d;
    --panel: #11161f;
    --line: #1c2735;
    --text: #c8d3e0;
    --text-dim: #6b7888;
    --accent: #4fd1c5;
    --accent-dim: #2a6e68;
    --warn: #e06c75;
    --gold: #e0b56c;
    --glow: rgba(79, 209, 197, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    line-height: 1.85;
    letter-spacing: 0.02em;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(79,209,197,0.04), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(224,108,117,0.04), transparent 40%);
  }

  /* ---------- 顶部进度条 ---------- */
  .topbar {
    position: sticky;
    top: 0;
    width: 100%;
    z-index: 50;
    background: rgba(10,14,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo {
    font-size: 13px;
    letter-spacing: 0.45em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); letter-spacing: 0.2em; }

  .ending-track {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ending-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    white-space: nowrap;
  }
  .pips { display: flex; gap: 6px; }
  .pip {
    width: 22px; height: 5px;
    border-radius: 3px;
    background: var(--line);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .pip.good { background: var(--accent); box-shadow: 0 0 8px var(--glow); }
  .pip.bad  { background: var(--warn);   box-shadow: 0 0 8px rgba(224,108,117,0.25); }
  .pip.gray { background: var(--gold);   box-shadow: 0 0 8px rgba(224,181,108,0.2); }

  .count {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .count b { color: var(--accent); }

  /* ---------- 主体 ---------- */
  main {
    max-width: 760px;
    width: 100%;
    padding: 56px 24px 120px;
    flex: 1;
  }

  .scene { animation: fadein 0.7s ease; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-tag {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .scene-text p {
    margin-bottom: 18px;
    font-size: 17px;
    color: var(--text);
  }
  .scene-text p.dim { color: var(--text-dim); font-size: 15px; }
  .scene-text .speaker { color: var(--accent); font-weight: 600; }
  .scene-text .sys {
    display: block;
    border-left: 2px solid var(--accent-dim);
    padding: 4px 0 4px 16px;
    margin: 22px 0;
    color: var(--accent);
    font-size: 14px;
    letter-spacing: 0.05em;
    font-family: "SF Mono", "Consolas", monospace;
    background: linear-gradient(90deg, var(--glow), transparent);
  }

  .prompt {
    margin: 38px 0 22px;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .choices { display: flex; flex-direction: column; gap: 14px; }
  .choice {
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 18px 22px;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    line-height: 1.6;
  }
  .choice:hover {
    border-color: var(--accent-dim);
    background: var(--bg-soft);
    transform: translateX(4px);
    box-shadow: -3px 0 0 var(--accent);
  }
  .choice .hint {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  /* ---------- 结局界面 ---------- */
  .ending-screen { text-align: center; padding-top: 30px; }
  .ending-screen .verdict {
    font-size: 12px; letter-spacing: 0.4em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .ending-screen.good .verdict { color: var(--accent); }
  .ending-screen.bad  .verdict { color: var(--warn); }
  .ending-screen.gray .verdict { color: var(--gold); }
  .ending-screen h1 {
    font-size: 30px; font-weight: 700;
    letter-spacing: 0.08em; margin-bottom: 26px;
  }
  .ending-screen .epilogue {
    font-size: 16px; color: var(--text);
    text-align: left; max-width: 580px; margin: 0 auto 14px;
  }
  .ending-screen .reflect {
    font-size: 14px; color: var(--text-dim);
    font-style: italic; max-width: 560px;
    margin: 30px auto; padding: 18px 20px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .actions { margin-top: 40px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 13px 28px;
    border-radius: 8px;
    font-size: 14px; font-family: inherit;
    letter-spacing: 0.12em; cursor: pointer;
    transition: all 0.25s;
  }
  .btn:hover { background: var(--accent-dim); color: #fff; box-shadow: 0 0 16px var(--glow); }
  .btn.ghost { border-color: var(--line); color: var(--text-dim); }
  .btn.ghost:hover { border-color: var(--text-dim); background: var(--bg-soft); color: var(--text); box-shadow: none; }

  /* ---------- 结局图鉴 ---------- */
  .gallery {
    margin-top: 44px;
    border-top: 1px solid var(--line);
    padding-top: 28px;
  }
  .gallery h3 {
    font-size: 12px; letter-spacing: 0.3em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 18px; text-align: center;
  }
  .gallery-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .card {
    border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 16px; background: var(--panel);
    transition: all 0.3s;
  }
  .card.locked { opacity: 0.4; }
  .card .ix { font-size: 11px; color: var(--text-dim); letter-spacing: 0.2em; }
  .card .nm { font-size: 14px; margin-top: 6px; }
  .card.unlocked.good { border-color: var(--accent-dim); }
  .card.unlocked.good .nm { color: var(--accent); }
  .card.unlocked.bad  { border-color: rgba(224,108,117,0.4); }
  .card.unlocked.bad  .nm { color: var(--warn); }
  .card.unlocked.gray { border-color: rgba(224,181,108,0.4); }
  .card.unlocked.gray .nm { color: var(--gold); }
  .card .locktxt { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

  /* ---------- 标题页 ---------- */
  .title-screen { text-align: center; padding-top: 8vh; }
  .title-screen .big {
    font-size: 58px; font-weight: 800; letter-spacing: 0.3em;
    color: var(--text); margin-bottom: 6px;
  }
  .title-screen .sub {
    font-size: 14px; letter-spacing: 0.55em; color: var(--accent);
    margin-bottom: 40px;
  }
  .title-screen .year {
    font-size: 13px; color: var(--text-dim); letter-spacing: 0.15em;
    max-width: 540px; margin: 0 auto 44px; line-height: 2;
  }
  .title-screen .roster {
    max-width: 540px; margin: 0 auto 44px; text-align: left;
    border: 1px solid var(--line); border-radius: 10px; padding: 22px 26px;
    background: var(--panel);
  }
  .title-screen .roster .rt {
    font-size: 11px; letter-spacing: 0.3em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 14px;
  }
  .title-screen .roster .person { font-size: 14px; margin-bottom: 9px; }
  .title-screen .roster .person b { color: var(--accent); font-weight: 600; }
  .title-screen .roster .person span { color: var(--text-dim); }

  .footnote { text-align: center; color: var(--text-dim); font-size: 11px; padding: 30px; letter-spacing: 0.1em; }

  @media (max-width: 600px) {
    .topbar-inner { flex-wrap: wrap; gap: 10px; padding: 12px 16px; }
    .pip { width: 16px; }
    main { padding: 36px 18px 100px; }
    .title-screen .big { font-size: 40px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">裂痕 <span>FRACTURE</span></div>
      <div class="ending-track">
        <span class="ending-label">结局收集</span>
        <div class="pips" id="pips"></div>
      </div>
      <div class="count">已解锁 <b id="count">0</b> / 6</div>
    </div>
  </div>

  <main id="app"></main>

  <div class="footnote">这是一个关于战争、亲情与科技的思想实验 · 没有标准答案</div>

<script>
/* =========================================================
   裂痕 · FRACTURE
   一个关于未来两岸战争中，一个跨海家庭的互动小说
   ========================================================= */

/* ---------- 结局定义 ---------- */
const ENDINGS = {
  E1: { name: "回家的路",   type: "good", blurb: "你选择了人，而不是旗帜。" },
  E2: { name: "数字方舟",   type: "good", blurb: "肉体会死，但你们没有失去彼此。" },
  E3: { name: "忠诚的灰烬", type: "bad",  blurb: "你赢得了战争，输掉了所有亲人。" },
  E4: { name: "第二个我",   type: "bad",  blurb: "你成了一个不再是你的东西。" },
  E5: { name: "停火的人",   type: "gray", blurb: "你既非英雄，也非叛徒。" },
  E6: { name: "归零",       type: "gray", blurb: "当所有人都错了，沉默是唯一的清白。" },
};

/* ---------- 进度持久化 ---------- */
const SAVE_KEY = "fracture_endings_v1";
function loadUnlocked() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || []; }
  catch { return []; }
}
function saveUnlocked(arr) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(arr)); } catch {}
}
let unlocked = loadUnlocked();

/* ---------- 全局状态（单局内） ---------- */
let state = {};
function resetState() {
  state = {
    trustFather: 0,   // 与父亲（台湾·反战工程师）的信任
    trustBrother: 0,  // 与哥哥（大陆·数字生命研究员）的信任
    loyalty: 0,       // 对“国家/阵营”的忠诚倾向
    humanity: 0,      // 对“人”本身的坚持
    uploaded: false,  // 是否接受过意识上传
    cloneUsed: false, // 是否动用了克隆士兵
  };
}

/* =========================================================
   剧情节点
   每个节点: { tag, text:[...], prompt, choices:[{label,hint,go,fx}] }
   或结局节点: { ending:"E1" }
   ========================================================= */
const NODES = {

  start: {
    tag: "序章 · 公元 2049 · 台北",
    text: [
      `<p>战争在第七天清晨抵达台北的时候，并没有想象中的火光。</p>`,
      `<p>只有全城的屏幕同时熄灭，然后亮起同一行字。</p>`,
      `<p class="sys">[ 联合指挥网络 · 已接管本区通讯 ]</p>`,
      `<p>你叫<span class="speaker">林深</span>，二十六岁。父亲是土生土长的台北人，母亲来自福建。三年前，哥哥<span class="speaker">林屿</span>去了对岸——他在那里做"数字生命"的研究，把临终者的意识备份成数据。</p>`,
      `<p>战争开始的那天，你的家，被一条海峡劈成了两半。</p>`,
      `<p class="dim">而你，因为半年前那场车祸，颅内植入了一枚实验性的脑机接口。此刻，它正在自动连入那张刚刚覆盖全城的网络。</p>`,
    ],
    prompt: "接口在你脑海里低声询问——",
    choices: [
      { label: "接入网络。我要知道发生了什么。", hint: "主动连入联合指挥网络", go: "net_in", fx: s => s.humanity += 0 },
      { label: "切断它。我不想成为这场战争的一部分。", hint: "物理隔离脑机接口", go: "offline", fx: s => s.loyalty -= 1 },
    ],
  },

  net_in: {
    tag: "第一章 · 接入",
    text: [
      `<p>世界在你脑后展开成一片流动的光。你"看见"了整座城市的数据脉络——防空系统、医院的生命维持、还有无数家庭此刻正在发送的最后讯息。</p>`,
      `<p>一条私密信道突然亮起，来自一个你以为再也连不上的地址。</p>`,
      `<p><span class="speaker">林屿（哥哥）：</span>"小深，是你吗？接口认出了你的脑波。听着，时间不多——我在对岸的项目被军方接管了。他们要用'数字生命'技术做一件事。"</p>`,
      `<p><span class="speaker">林屿：</span>"他们要把阵亡士兵的意识，反复上传进克隆体，做成不会拒绝命令、不会恐惧、可以无限复活的兵。我参与了。小深……我亲手写了那套唤醒程序。"</p>`,
    ],
    prompt: "哥哥的声音在颤抖。你——",
    choices: [
      { label: "\"哥，你疯了吗？那还是人吗？\"", hint: "质问他的伦理底线", go: "brother_ethics", fx: s => { s.humanity += 1; } },
      { label: "\"先别管对错，告诉我怎么阻止。\"", hint: "把哥哥当成盟友", go: "brother_ally", fx: s => { s.trustBrother += 1; } },
      { label: "\"你在对岸为他们造兵——你已经选边了。\"", hint: "把哥哥视为敌人", go: "brother_enemy", fx: s => { s.loyalty += 1; s.trustBrother -= 1; } },
    ],
  },

  offline: {
    tag: "第一章 · 离线",
    text: [
      `<p>你用力按下耳后的硬件开关。光退去了，世界重新变得迟钝而真实。</p>`,
      `<p>你想做一个普通人，在乱世里只管护住身边的人。可门外传来沉重的脚步声——三个穿着联合军制服的人，敲响了你家的门。</p>`,
      `<p><span class="speaker">军官：</span>"林深先生。你颅内的接口是稀缺的战时资源。我们需要它，也需要你。拒绝，将被视为通敌。"</p>`,
      `<p class="dim">他们身后，你看见父亲被两名士兵架着。他的眼神示意你：不要妥协。</p>`,
    ],
    prompt: "父亲在用口型说\"跑\"。你——",
    choices: [
      { label: "重新接入网络，攻击他们的指挥链路。", hint: "用接口反击", go: "net_in", fx: s => { s.humanity += 1; s.loyalty -= 1; } },
      { label: "投降，但要求他们先放了父亲。", hint: "用自己换父亲", go: "father_trade", fx: s => { s.trustFather += 1; } },
      { label: "什么都不做。战争里，反抗只会害死所有人。", hint: "彻底的服从", go: "submit", fx: s => { s.loyalty += 2; s.humanity -= 1; } },
    ],
  },

  /* ---- 哥哥线 ---- */
  brother_ethics: {
    tag: "第二章 · 唤醒程序",
    text: [
      `<p><span class="speaker">林屿：</span>"是不是人……我每天都在问自己。小深，被唤醒的那些意识，会在第一秒哭着喊妈妈，然后在第三秒被覆写成只懂服从的士兵。我把这叫做'清醒的两秒'。"</p>`,
      `<p><span class="speaker">林屿：</span>"我在程序里留了一个后门。如果你能从台北这一侧接入，我们可以一起触发它——让所有克隆兵在战场上保留那'两秒的清醒'。他们会想起自己是谁，然后……可能集体停止战斗，也可能集体崩溃。我赌不准。"</p>`,
      `<p class="sys">[ 检测到后门密钥 · 需要双端同时授权 ]</p>`,
    ],
    prompt: "这可能终结战争，也可能制造一场数字屠杀。",
    choices: [
      { label: "和哥哥一起触发后门。赌人性。", hint: "信任那\"两秒的清醒\"", go: "backdoor", fx: s => { s.trustBrother += 2; s.humanity += 2; } },
      { label: "拒绝。不能拿几十万意识当赌注。", hint: "守住自己的底线", go: "refuse_backdoor", fx: s => { s.humanity += 1; s.trustBrother -= 1; } },
    ],
  },

  brother_ally: {
    tag: "第二章 · 同谋",
    text: [
      `<p><span class="speaker">林屿：</span>"好。我就知道你会帮我。"他笑了一声，那笑声里有三年没听过的、属于哥哥的温度。</p>`,
      `<p><span class="speaker">林屿：</span>"我在程序里留了后门，能让克隆兵恢复'清醒的两秒'。但触发它，对岸会立刻定位到我。小深，如果我们做了这件事，我大概……回不来了。"</p>`,
      `<p class="dim">你忽然意识到，哥哥从一开始，就没打算活着走出那座实验室。</p>`,
    ],
    prompt: "你听懂了他没说出口的话。",
    choices: [
      { label: "\"那就一起做。哥，我替你记得你是谁。\"", hint: "成全他的牺牲", go: "backdoor", fx: s => { s.trustBrother += 2; s.humanity += 1; } },
      { label: "\"不行。我先把你的意识备份出来，再触发。\"", hint: "想救哥哥", go: "save_brother", fx: s => { s.trustBrother += 1; } },
    ],
  },

  brother_enemy: {
    tag: "第二章 · 决裂",
    text: [
      `<p><span class="speaker">林屿：</span>"……选边？小深，我去对岸，是因为那里有人愿意给数字生命一个法律身份。妈走的时候，我只来得及备份她的意识碎片——在台北，那是违法的。"</p>`,
      `<p>你愣住了。母亲的死讯，你以为只有你一个人在深夜里反复咀嚼。</p>`,
      `<p><span class="speaker">林屿：</span>"她还在我手里，小深。一段不完整的、会笑会喊你乳名的代码。你要我交给军方当武器实验体，还是……你过来，我们一起把她藏好？"</p>`,
    ],
    prompt: "母亲的\"残响\"，成了战争里的筹码。",
    choices: [
      { label: "放下立场，去保护母亲的数据。", hint: "血缘高于阵营", go: "brother_ally", fx: s => { s.trustBrother += 2; s.loyalty -= 1; s.humanity += 1; } },
      { label: "向联合军举报哥哥的位置，换取自身安全。", hint: "彻底背叛血缘", go: "betray_brother", fx: s => { s.loyalty += 2; s.trustBrother -= 3; } },
    ],
  },

  /* ---- 父亲线 ---- */
  father_trade: {
    tag: "第二章 · 交换",
    text: [
      `<p>他们放开了父亲。你被铐上抑制环，押进一辆装甲车。临走前，父亲抓住你的手腕，往你掌心塞了一枚芯片。</p>`,
      `<p><span class="speaker">林国栋（父亲）：</span>"这是我做了一辈子的东西——一个能让所有联网武器'失明'三分钟的病毒。我本想带进坟墓。现在它是你的了。"</p>`,
      `<p><span class="speaker">父亲：</span>"小深，爸不要你当英雄。三分钟，够你跑，也够你做一件改变战局的事。怎么用，你自己决定。但记住——别为了一个'对'，弄丢了你自己。"</p>`,
    ],

/* =========================================================
   渲染引擎
   ========================================================= */
const app = document.getElementById("app");

function go(nodeId) {
  const node = NODES[nodeId];
  if (!node) { console.error("缺失节点:", nodeId); return; }

  // 路由节点：根据状态跳转
  if (node.router) {
    return go(node.router(state));
  }
  // 结局节点
  if (node.ending) {
    return renderEnding(node);
  }
  renderScene(node);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderScene(node) {
  const choicesHtml = node.choices.map((c, i) => `
    <button class="choice" data-i="${i}">
      ${c.label}
      ${c.hint ? `<span class="hint">› ${c.hint}</span>` : ""}
    </button>
  `).join("");

  app.innerHTML = `
    <div class="scene">
      <div class="scene-tag">${node.tag || ""}</div>
      <div class="scene-text">${node.text.join("")}</div>
      <div class="prompt">${node.prompt || "你的选择——"}</div>
      <div class="choices">${choicesHtml}</div>
    </div>
  `;

  app.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = node.choices[Number(btn.dataset.i)];
      if (c.fx) c.fx(state);
      go(c.go);
    });
  });
}

function renderEnding(node) {
  const e = ENDINGS[node.ending];
  // 解锁
  if (!unlocked.includes(node.ending)) {
    unlocked.push(node.ending);
    saveUnlocked(unlocked);
    renderTopbar();
  }

  app.innerHTML = `
    <div class="scene ending-screen ${e.type}">
      <div class="verdict">${e.type === "good" ? "结局 · 微光" : e.type === "bad" ? "结局 · 深渊" : "结局 · 灰度"}</div>
      <h1>${e.name}</h1>
      <div class="epilogue">${node.epilogue.join("")}</div>
      <div class="reflect">${e.blurb}<br><br>${node.reflect}</div>
      <div class="actions">
        <button class="btn" id="again">从头开始</button>
        <button class="btn ghost" id="toTitle">返回标题</button>
      </div>
      ${renderGallery()}
    </div>
  `;
  document.getElementById("again").addEventListener("click", startGame);
  document.getElementById("toTitle").addEventListener("click", renderTitle);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderGallery() {
  const cards = Object.keys(ENDINGS).map(key => {
    const e = ENDINGS[key];
    const isUnlocked = unlocked.includes(key);
    return `
      <div class="card ${isUnlocked ? "unlocked " + e.type : "locked"}">
        <div class="ix">${key}</div>
        <div class="nm">${isUnlocked ? e.name : "??????"}</div>
        <div class="locktxt">${isUnlocked ? e.blurb : "尚未解锁"}</div>
      </div>
    `;
  }).join("");
  return `
    <div class="gallery">
      <h3>结局图鉴 · ${unlocked.length} / 6</h3>
      <div class="gallery-grid">${cards}</div>
    </div>
  `;
}

/* ---------- 顶部进度条 ---------- */
function renderTopbar() {
  const pipsEl = document.getElementById("pips");
  const order = ["E1","E2","E5","E6","E3","E4"]; // 视觉排布：好-灰-坏
  pipsEl.innerHTML = order.map(key => {
    const e = ENDINGS[key];
    const on = unlocked.includes(key);
    const cls = on ? (e.type === "good" ? "good" : e.type === "bad" ? "bad" : "gray") : "";
    return `<div class="pip ${cls}" title="${on ? e.name : "未解锁"}"></div>`;
  }).join("");
  document.getElementById("count").textContent = unlocked.length;
}

        也把最古老的难题，重新摆上了桌面：<br>
        当家与国不能两全，你，会背叛谁？
      </div>
      <div class="roster">
        <div class="rt">登场人物</div>
        <div class="person"><b>林深</b>（你）<span> · 台北，颅内植有实验性脑机接口</span></div>
        <div class="person"><b>林国栋</b>（父亲）<span> · 台北工程师，反战，握有"致盲"病毒</span></div>
        <div class="person"><b>林屿</b>（哥哥）<span> · 对岸的数字生命研究员，被军方接管</span></div>
        <div class="person"><b>母亲</b><span> · 已逝，仅余一段不完整的意识备份</span></div>
      </div>
      <div class="actions">
        <button class="btn" id="begin">进入故事</button>
        ${unlocked.length > 0 ? `<button class="btn ghost" id="seeGallery">查看结局图鉴</button>` : ""}
      </div>
    </div>
  `;
  document.getElementById("begin").addEventListener("click", startGame);
  const sg = document.getElementById("seeGallery");
  if (sg) sg.addEventListener("click", () => {
    app.innerHTML = `<div class="scene">${renderGallery()}
      <div class="actions"><button class="btn ghost" id="back">返回标题</button></div></div>`;
    document.getElementById("back").addEventListener("click", renderTitle);
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ---------- 启动 ---------- */
function startGame() {
  resetState();
  go("start");
}

renderTopbar();
renderTitle();
</script>
</body>
</html>
